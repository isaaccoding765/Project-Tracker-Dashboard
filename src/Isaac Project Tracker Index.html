<html lang="en"><head>

  <title>Project Tracker Dashboard v1</title>

</head>
<body>
  <header>
    <h1>Project Tracker</h1>
    <p>Blurb about the project</p>

    <nav>
      <ul>

      <li><a href="#about">About</a></li>

  <main>

    <!-- Add Task Controls – includes priority selector -->

    <h2>Dashboard</h2>

      <section>
        <h3>To do</h3>
        <p>Add JavaScript</p>
      </section>

      <section>
        <h3>In Progress</h3>
        <p>Build Dashboard Interface</p>
      </section>

      <section>
        <h3>Done</h3>
        <p></p>
      </section>
    </div>
  </main>
  <footer>
    <p>Project tracker copyright</p>
  </footer>

    <script src="scripts.js"></script>

  </body></html>
